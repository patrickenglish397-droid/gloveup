name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Baked into the SPA at build time. Both secrets are optional — if
          # missing, the build still succeeds but the affected features degrade:
          #   VITE_TURNSTILE_SITE_KEY missing -> Turnstile widget shows warning
          #   VITE_PUBLIC_READ_TOKEN  missing -> read endpoints require login
          VITE_API_BASE: https://gloveup-api.cfpe397.workers.dev
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          VITE_PUBLIC_READ_TOKEN: ${{ secrets.PUBLIC_READ_TOKEN }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages deploy dist --project-name=gloveup --branch=main --commit-dirty=true
